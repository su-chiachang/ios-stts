name: STTS
options:
  bundleIdPrefix: com.jiajing
  deploymentTarget:
    macOS: "15.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.0
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_ENTITLEMENTS: App/Resources/STTS.entitlements
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "STTS needs microphone access to listen to your voice."
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_HARDENED_RUNTIME: YES
    LD_RUNPATH_SEARCH_PATHS:
      - "@executable_path/../Frameworks"
    OTHER_LDFLAGS:
      - "-L$(SRCROOT)/vendor/parakeet/lib"
      - "-lparakeet"
      - "-lggml"
      - "-lggml-base"
      - "-lggml-cpu"
      - "-lggml-metal"
      - "-lggml-blas"
      - "-L$(SRCROOT)/vendor/qwentts/lib"
      - "-lqwen"
      - "-lc++"

packages:
  NativeShims:
    path: Packages/NativeShims

targets:
  STTS:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - Resources/STTS.entitlements
    dependencies:
      - package: NativeShims
        product: CParakeet
      - package: NativeShims
        product: CQwenTTS
      - sdk: Accelerate.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: CoreML.framework
      - sdk: AVFoundation.framework
    preBuildScripts:
      - name: "Check parakeet"
        script: |
          if [ ! -f "$SRCROOT/vendor/parakeet/lib/libparakeet.a" ]; then
            "$SRCROOT/scripts/build-parakeet-macos.sh"
          fi
      - name: "Check qwentts"
        script: |
          if [ ! -f "$SRCROOT/vendor/qwentts/lib/libqwen.dylib" ]; then
            "$SRCROOT/scripts/build-qwentts-macos.sh"
          fi
      - name: "Vendor libs present?"
        script: |
          set -e
          for f in libparakeet.a libggml.a; do
            if [ ! -f "$SRCROOT/vendor/parakeet/lib/$f" ]; then
              echo "error: missing $SRCROOT/vendor/parakeet/lib/$f — run scripts/build-parakeet-macos.sh"
              exit 1
            fi
          done
          if [ ! -f "$SRCROOT/vendor/qwentts/lib/libqwen.dylib" ]; then
            echo "error: missing $SRCROOT/vendor/qwentts/lib/libqwen.dylib — run scripts/build-qwentts-macos.sh"
            exit 1
          fi
    postBuildScripts:
      - name: "Embed qwentts dylibs"
        script: |
          set -e
          dest="$CODESIGNING_FOLDER_PATH/Contents/Frameworks"
          mkdir -p "$dest"
          for lib in "$SRCROOT"/vendor/qwentts/lib/*.dylib; do
            cp -f "$lib" "$dest/"
            codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" --timestamp=none "$dest/$(basename "$lib")" || true
          done
